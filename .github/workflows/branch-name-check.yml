name: Branch Name Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        run: |
          # github.head_ref is only populated on pull_request* events.
          # For push (direct branch pushes), use github.ref_name
          
          BRANCH="${{ github.head_ref || github.ref_name }}"
          
          echo "Validating branch name: $BRANCH"
          if [[ ! "$BRANCH" =~ ^(feature|bug)/[0-9]+-[A-Z][a-zA-Z0-9_\-]+$ ]]; then
            echo "::error::Branch name must follow the pattern 'feature/N-Description' or 'bug/N-Description' (e.g., feature/123-Add-Login)"
            exit 1
          fi
